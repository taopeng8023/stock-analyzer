# 股票筛选与多因子决策工作流配置

# ==================== 数据源配置 ====================
[TUSHARE]
api_token = your_tushare_token_here
base_url = http://api.tushare.pro

# ==================== 筛选条件配置 ====================
[STOCK_FILTER]
# 主板筛选
main_board_prefix = 60, 00
exclude_prefix = 300, 688, 8, 2, 4

# 上市时间要求（交易日）
min_listing_days = 60

# 成交额门槛（万元）
min_turnover = 5000

# 成交量放大倍数
volume_amplify_ratio = 1.5

# 均量计算周期
volume_ma_period = 5

# ==================== 技术指标配置 ====================
[TECHNICAL_INDICATORS]
# 趋势指标
ma_periods = 5, 20
macd_fast = 12
macd_slow = 26
macd_signal = 9

# 摆动指标
rsi_period = 14
kdj_period = 9

# 波动指标
atr_period = 14
bollinger_period = 20

# 特征筛选相关性阈值
feature_correlation_threshold = 0.15

# ==================== 消息分析配置 ====================
[NEWS_ANALYSIS]
# 消息时间窗口（天）
news_window_days = 180

# 重大公告权重提升
major_event_weight = 1.5

# 情感分析模型
sentiment_model = snowNLP

# ==================== 数据质量配置 ====================
[DATA_QUALITY]
# 缺失率阈值
missing_rate_threshold = 0.1

# 异常值分位数
outlier_quantile_low = 0.01
outlier_quantile_high = 0.99

# 异常率阈值
abnormal_rate_threshold = 0.05

# 质量评分合格线
quality_score_threshold = 95

# ==================== 模型配置 ====================
[MODEL]
# 模型类型
model_type = xgboost

# 训练窗口（交易日）
train_window = 250

# 预测周期（交易日）
predict_horizon = 3

# 推荐股票数量
top_n_stocks = 10

# 上涨概率阈值
min_up_probability = 0.2

# ==================== 调度配置 ====================
[SCHEDULE]
# 每日启动时间
start_time = 15:30

# 时区
timezone = Asia/Shanghai

# ==================== 输出配置 ====================
[OUTPUT]
# 输出格式
output_format = json, csv

# 数据库配置
db_type = mysql
db_host = localhost
db_port = 3306
db_name = stock_workflow
db_user = root
db_password = your_password

# 推送配置
enable_email = false
enable_wechat = true
enable_api = true
